name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: "lts/*"

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: |
          bun add --global purescript@0.15.15 spago@latest
          bun install
          spago install

      - name: Build
        run: spago build

      - name: Test
        run: spago test